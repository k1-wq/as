<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>欢迎进入</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #1b3a7a 0%, #0f1b3f 40%, #050913 100%);
      color: #fff;
    }

    body {
      position: relative;
    }

    .background-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .background-layer span {
      position: absolute;
      display: block;
      border-radius: 50%;
      opacity: 0.35;
      filter: blur(18px);
      transform: translate3d(0,0,0);
    }

    .background-layer span:nth-child(1) {
      width: 260px;
      height: 260px;
      background: rgba(50, 140, 255, 0.4);
      top: 10%;
      left: 5%;
    }

    .background-layer span:nth-child(2) {
      width: 280px;
      height: 280px;
      background: rgba(255, 100, 180, 0.25);
      bottom: 15%;
      right: 10%;
    }

    .background-layer span:nth-child(3) {
      width: 220px;
      height: 220px;
      background: rgba(80, 220, 160, 0.3);
      top: 25%;
      right: 15%;
    }

    .background-layer span:nth-child(4) {
      width: 180px;
      height: 180px;
      background: rgba(255, 220, 80, 0.25);
      bottom: 23%;
      left: 14%;
    }

    .entry-card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(540px, calc(100% - 40px));
      padding: 40px;
      border-radius: 28px;
      transform: translate(-50%, -50%);
      background: rgba(14, 24, 60, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
      text-align: center;
      overflow: hidden;
    }

    .entry-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top center, rgba(255,255,255,0.12), transparent 42%);
      pointer-events: none;
    }

    .entry-title {
      font-size: clamp(2.5rem, 4vw, 4rem);
      letter-spacing: 0.12em;
      margin-bottom: 18px;
      animation: floatIn 1s ease-out forwards;
      opacity: 0;
      transform: translateY(18px);
    }

    .entry-subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.9;
      margin-bottom: 34px;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
      animation: floatIn 1.1s ease-out forwards;
      opacity: 0;
      transform: translateY(18px);
    }

    .enter-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 198px;
      padding: 16px 34px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #5c95ff, #a36cff);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.28s ease, box-shadow 0.28s ease, background 0.28s ease;
      box-shadow: 0 18px 40px rgba(92, 149, 255, 0.3);
      position: relative;
      overflow: hidden;
      animation: floatIn 1.2s ease-out forwards;
      opacity: 0;
      transform: translateY(18px);
    }

    .enter-button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 24px 48px rgba(92, 149, 255, 0.38);
      background: linear-gradient(135deg, #6eb3ff, #d18cff);
    }

    .enter-button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .enter-button:hover::after {
      opacity: 1;
    }

    .hint {
      margin-top: 24px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.95rem;
      animation: floatIn 1.3s ease-out forwards;
      opacity: 0;
      transform: translateY(18px);
    }

    @keyframes floatIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="background-layer" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="entry-card" id="entryCard">
    <h1 class="entry-title">欢迎来到无人机飞行指挥中心</h1>
    <p class="entry-subtitle">移动鼠标即可触发视觉层次效果，点击按钮进入系统。页面已添加渐变背景、浮动光斑与按钮动画。</p>
    <button class="enter-button" id="enterButton">点击进入</button>
    <p class="hint">Tip: 轻触按钮，开始探索页面</p>
  </div>

  <script>
    const card = document.getElementById('entryCard');
    const button = document.getElementById('enterButton');

    document.addEventListener('mousemove', event => {
      const x = event.clientX / window.innerWidth;
      const y = event.clientY / window.innerHeight;
      const moveX = (x - 0.5) * 30;
      const moveY = (y - 0.5) * 30;
      card.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
    });

    button.addEventListener('click', () => {
      window.location.href = '首页.html';
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth < 500) {
        card.style.padding = '28px 20px';
      } else {
        card.style.padding = '40px';
      }
    });
  </script>
</body>
</html>
