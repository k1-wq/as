<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - DroneControl</title>
    <link rel="stylesheet" href="css/首页style.css">
    <style>
        .login-page {
            min-height: calc(100vh - 130px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .login-box h2 {
            margin-bottom: 18px;
            color: #333;
            text-align: center;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 0 24px;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .forgot-link:hover {
            color: #764ba2;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: #666;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🚁</span>
                <span class="logo-text">DroneControl</span>
            </div>
            <div class="user-actions">
                <a class="btn-login" href="首页.html">返回首页</a>
                <a class="btn-register" href="注册.html">注册</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="login-page">
            <div class="login-box">
                <h2>用户登录</h2>
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="login-email">邮箱/用户名</label>
                        <input type="text" id="login-email" placeholder="请输入邮箱或用户名" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox"> 记住我
                        </label>
                        <a class="forgot-link" href="忘记密码.html">忘记密码?</a>
                    </div>
                    <button type="submit" class="btn-submit">登录</button>
                </form>
                <p class="login-footer">还没有账号? <a href="注册.html">立即注册</a></p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 DroneControl. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script src="js/登录script.js"></script>
</body>
</html>
