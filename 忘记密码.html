<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - DroneControl</title>
    <link rel="stylesheet" href="css/首页style.css">
    <style>
        .forgot-container {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .forgot-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .forgot-header h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .forgot-header p {
            color: #666;
            font-size: 0.95rem;
        }

        /* 验证方式切换 */
        .verify-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f5f7fa;
            padding: 5px;
            border-radius: 10px;
        }

        .verify-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .verify-tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .verify-tab:hover:not(.active) {
            color: #333;
        }

        /* 验证表单 */
        .verify-form {
            display: none;
        }

        .verify-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 验证码输入组 */
        .code-input-group {
            display: flex;
            gap: 10px;
        }

        .code-input-group input {
            flex: 1;
        }

        .btn-send-code {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            white-space: nowrap;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .btn-send-code:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-send-code:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* 提示信息 */
        .tip-message {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #1976d2;
            font-size: 0.9rem;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* 密码强度提示 */
        .password-strength {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #666;
        }

        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-fill.weak {
            width: 33%;
            background: #f44336;
        }

        .strength-fill.medium {
            width: 66%;
            background: #ff9800;
        }

        .strength-fill.strong {
            width: 100%;
            background: #4caf50;
        }

        @media (max-width: 768px) {
            .forgot-box {
                padding: 30px 20px;
            }

            .forgot-header h1 {
                font-size: 1.6rem;
            }

            .code-input-group {
                flex-direction: column;
            }

            .btn-send-code {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="top-header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🚁</span>
                <span class="logo-text">DroneControl</span>
            </div>
        </div>
    </header>

    <!-- 忘记密码内容 -->
    <div class="forgot-container">
        <div class="forgot-box">
            <div class="forgot-header">
                <h1>🔐 找回密码</h1>
                <p>请选择验证方式重置您的密码</p>
            </div>

            <!-- 验证方式切换 -->
            <div class="verify-tabs">
                <button class="verify-tab active" onclick="switchVerifyMethod(event, 'phone')">
                    📱 手机验证
                </button>
                <button class="verify-tab" onclick="switchVerifyMethod(event, 'email')">
                    📧 邮箱验证
                </button>
            </div>

            <!-- 手机验证表单 -->
            <form id="phoneForm" class="verify-form active" onsubmit="handlePhoneReset(event)">
                <div class="tip-message">
                    💡 我们将向您的手机发送6位验证码，请注意查收
                </div>

                <div class="form-group">
                    <label for="phone-number">手机号</label>
                    <input type="tel" id="phone-number" placeholder="请输入注册时的手机号" pattern="[0-9]{11}" maxlength="11" required>
                </div>

                <div class="form-group">
                    <label for="phone-code">验证码</label>
                    <div class="code-input-group">
                        <input type="text" id="phone-code" placeholder="请输入6位验证码" pattern="[0-9]{6}" maxlength="6" required>
                        <button type="button" class="btn-send-code" id="btnSendPhoneCode" onclick="sendPhoneCode()">
                            获取验证码
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="new-phone-password">新密码</label>
                    <input type="password" id="new-phone-password" placeholder="请设置新密码(至少8位)" minlength="8" required oninput="checkPasswordStrength(this.value, 'phone')">
                    <div class="password-strength">
                        <div>密码强度: <span id="phone-strength-text">未输入</span></div>
                        <div class="strength-bar">
                            <div class="strength-fill" id="phone-strength-bar"></div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-phone-password">确认新密码</label>
                    <input type="password" id="confirm-phone-password" placeholder="请再次输入新密码" required>
                </div>

                <button type="submit" class="btn-submit">重置密码</button>
            </form>

            <!-- 邮箱验证表单 -->
            <form id="emailForm" class="verify-form" onsubmit="handleEmailReset(event)">
                <div class="tip-message">
                    💡 我们将向您的邮箱发送6位验证码，请注意查收并输入以完成密码重置
                </div>

                <div class="form-group">
                    <label for="reset-email">邮箱地址</label>
                    <input type="email" id="reset-email" placeholder="请输入注册时的邮箱" required>
                </div>

                <div class="form-group">
                    <label for="email-code">验证码</label>
                    <div class="code-input-group">
                        <input type="text" id="email-code" placeholder="请输入6位验证码" pattern="[0-9]{6}" maxlength="6" required>
                        <button type="button" class="btn-send-code" id="btnSendEmailCode" onclick="sendEmailCode()">
                            获取验证码
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="new-email-password">新密码</label>
                    <input type="password" id="new-email-password" placeholder="请设置新密码(至少8位)" minlength="8" required oninput="checkPasswordStrength(this.value, 'email')">
                    <div class="password-strength">
                        <div>密码强度: <span id="email-strength-text">未输入</span></div>
                        <div class="strength-bar">
                            <div class="strength-fill" id="email-strength-bar"></div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-email-password">确认新密码</label>
                    <input type="password" id="confirm-email-password" placeholder="请再次输入新密码" required>
                </div>

                <button type="submit" class="btn-submit">重置密码</button>
            </form>

            <a href="首页.html" class="back-link">← 返回登录页面</a>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 DroneControl. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script src="忘记密码.js"></script>
</body>
</html>
